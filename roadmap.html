<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="o-assets/head.js"></script>
<title>Lộ trình cuộc thi - Olympic Toán Tuổi thơ</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 selection:bg-blue-100 flex flex-col min-h-screen">

<olympic-header></olympic-header>

<main class="flex-grow">

<!-- HERO -->
<section class="relative overflow-hidden bg-gradient-to-br from-emerald-700 via-emerald-600 to-sky-500">
  <div class="math-bg">
    <span class="olympic-math-thele-1">📍</span>
    <span class="olympic-math-thele-2">🗺️</span>
    <span class="olympic-math-thele-3">🏆</span>

    <span class="olympic-math-thele-5">🚀</span>
  </div>
  <div class="container mx-auto px-4 py-6 lg:py-8 relative z-10">
    <div class="text-white max-w-2xl">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-xl bg-white/20 flex items-center justify-center flex-shrink-0">
          <span class="material-symbols-outlined text-white text-xl">map</span>
        </div>
        <h1 class="text-2xl lg:text-3xl font-black leading-tight">Lộ trình cuộc thi</h1>
      </div>
      <p class="text-emerald-100 text-sm">Khám phá từng chặng đường trên bản đồ phiêu lưu toán học Olympic Toán Tuổi thơ 2026!</p>
    </div>
  </div>
</section>

<!-- ROADMAP -->
<olympic-roadmap></olympic-roadmap>

</main>

<olympic-footer></olympic-footer>
<olympic-mobile-nav></olympic-mobile-nav>
